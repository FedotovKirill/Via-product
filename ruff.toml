# Ruff: линтер + форматтер
# Документация: https://docs.astral.sh/ruff/

target-version = "py311"
line-length = 100

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "W",     # pycodestyle warnings
    "I",     # isort (сортировка импортов)
    "UP",    # pyupgrade
]

ignore = [
    "E501",  # line length — ruff-format сам форматирует
]

[lint.isort]
known-first-party = ["src", "database", "security", "config", "mail", "matrix_client", "matrix_send", "preferences", "admin_main", "bot"]
